<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF GLOBAL TERMINAL | PLAYER SEARCH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-wrapper"></div>

    <div class="app-container">
        <section class="left-panel">
            <div class="brand">
                <span>DATABASE ACCESS</span>
                <h1>FF GLOBAL<br>TERMINAL</h1>
            </div>

            <div class="search-box">
                <h3>ENTER ENCRYPTED UID</h3>
                <div class="input-container">
                    <input type="text" id="uidInput" placeholder="PLAYER UID..." maxlength="12">
                    <button id="searchBtn">SCAN</button>
                </div>
                <div id="errorMsg" style="margin-top: 15px; color: #ff4d00; display: none; font-weight: 700;"></div>
                <center><div id="loader" class="loader" style="margin-top: 20px;"></div></center>
            </div>
        </section>

        <section class="right-panel">
            <div id="result">
                <div class="card">
                    <div class="profile-header">
                        <div class="avatar">
                            <img id="pAvatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=ff" alt="">
                        </div>
                        <div class="p-info">
                            <h2 id="pName">---</h2>
                            <span class="uid-txt">UID: <span id="pID">000000</span></span>
                        </div>
                    </div>

                    <div class="stats-container">
                        <div class="stat">
                            <span class="stat-label">Power Level</span>
                            <span class="stat-value" id="pLevel">--</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Region Code</span>
                            <span class="stat-value" id="pRegion">--</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Battle Royale</span>
                            <span class="stat-value" id="pBR" style="color: #00f2ff;">--</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Clash Squad</span>
                            <span class="stat-value" id="pCS" style="color: #00f2ff;">--</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Commendations</span>
                            <span class="stat-value" id="pLikes">--</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Service Since</span>
                            <span class="stat-value" id="pCreated" style="font-size: 1.1rem;">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
